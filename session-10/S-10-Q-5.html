<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Delivery Filter Buttons</title>

  
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h3 class="text-center mb-4">Food Filters</h3>

    <div class="d-flex justify-content-center gap-2 flex-wrap">

        <button class="btn btn-success active">All</button>
        <button class="btn btn-outline-success">Veg</button>
        <button class="btn btn-outline-danger">Non-Veg</button>
        <button class="btn btn-outline-warning">Desserts</button>

    </div>

</div>

</body>
</html>
