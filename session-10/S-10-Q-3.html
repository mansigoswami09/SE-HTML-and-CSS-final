<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookMyShow Featured Movies</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f5f5;
        }

        h2 {
            text-align: center;
            margin: 30px 0;
            color: #d81f26;
        }

        .carousel-item img {
            width: 50%;
            height: 500px;
            object-fit: contain;
            
        }

        .carousel-caption {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 10px;
            padding: 15px;
        }
    </style>
</head>
<body>

<div class="container mt-4">
    <h2>Featured Movies</h2>

    <div id="movieCarousel" class="carousel slide" data-bs-ride="carousel">

        <div class="carousel-indicators">
            <button type="button" data-bs-target="#movieCarousel" data-bs-slide-to="0" class="active"></button>
            <button type="button" data-bs-target="#movieCarousel" data-bs-slide-to="1"></button>
            <button type="button" data-bs-target="#movieCarousel" data-bs-slide-to="2"></button>
        </div>

      
        <div class="carousel-inner">

            <div class="carousel-item active">
                <img src="https://assets-in.bmscdn.com/iedb/movies/images/mobile/thumbnail/xlarge/jindagi-once-more-et00501011-1780035511.jpg" 
                     class="d-block mx-auto" alt="Movie 1">
                <div class="carousel-caption">
                    <h5>Jindagi Once More</h5>
                    <p>Drama/Family.</p>
                </div>
            </div>

            <div class="carousel-item">
                <img src="https://assets-in.bmscdn.com/iedb/movies/images/mobile/thumbnail/xlarge/state-of-ramadhani-dharyu-dhani-nu-thay-et00502199-1781510542.jpg"
                     class="d-block mx-auto" alt="Movie 2">
                <div class="carousel-caption">
                    <h5>State of Ramadhani</h5>
                    <p>Drama/Family</p>
                </div>
            </div>

            <div class="carousel-item">
                <img src="https://assets-in.bmscdn.com/iedb/movies/images/mobile/thumbnail/xlarge/toy-story-5-et00482787-1780901834.jpg"
                     class="d-block mx-auto" alt="Movie 3">
                <div class="carousel-caption">
                    <h5>Toy Story 5</h5>
                    <p>Adventure/Animation/Comedy/Family</p>
                </div>
            </div>

        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#movieCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>

        <button class="carousel-control-next" type="button" data-bs-target="#movieCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>

    </div>
</div>
</body>
</html>
