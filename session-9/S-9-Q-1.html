<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Product Cards</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            background-color:#f1f3f6;
        }
        .card{
            transition:0.3s;
        }
        .card:hover{
            transform:scale(1.03);
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
        }
        .card img{
            height:220px;
            object-fit:contain;
            padding:15px;
        }
        .price{
            color:green;
            font-size:20px;
            font-weight:bold;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card h-100">
                    <img src="https://rukminim2.flixcart.com/image/2000/2660/xif0q/sports-action-camera/f/b/a/osmo-pocket-3-osmo-2-64-pocket-3-dji-original-imaguzhfz5z4xphr.jpeg?q=60" class="card-img-top" alt="product 1">
                    <div class="card-body text-center">
                        <h5 class="card-title">Camera</h5>
                        <p class="price">₹40,990</p>
                        <p class="card-text">dji Osmo Pocket 3 Sports and Action Camera (Black, 64 MP)</p>
                        <button class="btn btn-primary">Add to Cart</button>
                    </div>
                </div>
            </div>
             <div class="col-md-4">
                <div class="card h-100">
                    <img src="https://rukminim2.flixcart.com/image/1536/1536/xif0q/mobile/j/7/f/-original-imahft5gfgwpt6pr.jpeg?q=90" class="card-img-top" alt="product 2">
                    <div class="card-body text-center">
                        <h5 class="card-title">Apple iphone 17</h5>
                        <p class="price">₹79,400</p>
                        <p class="card-text">iPhone 17 (Lavender, 256 GB)</p>
                        <button class="btn btn-primary">Add to Cart</button>
                    </div>
                </div>
            </div>
             <div class="col-md-4">
                <div class="card h-100">
                    <img src="https://rukminim2.flixcart.com/image/1536/1536/xif0q/bottle/0/e/t/1000-sipper-cartoon-smiley-water-bottle-for-kids-1liter-1-sipper-original-imah5rgvty6f8ufj.jpeg?q=90" class="card-img-top" alt="product 3">
                    <div class="card-body text-center">
                        <h5 class="card-title">Water Bottle</h5>
                        <p class="price">₹197</p>
                        <p class="card-text">kettoby Teddy Water Bottle For kids Plastic 1 Pcs Cute Designer Anti Leak bottle 1000 ml Water Bottle (Set of 1, Multicolor)</p>
                        <button class="btn btn-primary">Add to Cart</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
