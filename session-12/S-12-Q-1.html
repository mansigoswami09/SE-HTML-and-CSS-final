<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Artist Landing Page</title>

   
    <link  href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#121212;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            text-align:center;
            background:#1f1f1f;
            padding:30px;
            border-radius:15px;
            width:350px;
            box-shadow:0 0 15px rgba(255,255,255,0.2);
        }

        .profile-img{
            width:150px;
            height:150px;
            border-radius:50%;
            object-fit:cover;
            border:4px solid #198754;
        }

        h1{
            margin-top:15px;
            color:#198754;
        }

        p{
            margin:15px 0;
            color:#ddd;
            line-height:1.5;
        }

        .social-buttons a{
            display:inline-block;
            text-decoration:none;
            color:white;
            background:#198754;
            padding:10px 15px;
            margin:5px;
            border-radius:8px;
            font-size:18px;
            transition:0.3s;
        }

        .social-buttons a:hover{
            background:#198754;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQS4skI8xJ0tW5NHhHwNhhAx08HrWcsv1kiFXKfCTjlIIkAJmLEtyVGBUaQ&s=10"
         alt="Artist" class="profile-img">

        <h1>Gaman santhal</h1>
        <p>
            Gaman Santhal is a popular Gujarati folk singer known for his
            energetic performances and traditional Gujarati songs. He has
            gained immense popularity among folk music lovers across Gujarat.
        </p>

        <div class="social-buttons">
            <a href="https://www.facebook.com/gamansanthal72"><i class="bi bi-facebook"></i></a>
            <a href="https://www.instagram.com/gamansanthal72"><i class="bi bi-instagram"></i></a>
            <a href="https://www.youtube.com/@GamanSanthal72"><i class="bi bi-youtube"></i></a>
        </div>
    </div>

</body>
</html>
