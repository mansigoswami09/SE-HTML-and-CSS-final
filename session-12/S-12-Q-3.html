<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Product Showcase</title>

  
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color:#f8f9fa;
        }
        .card img{
            height:200px;
            object-fit:cover;
        }
    </style>
</head>
<body>

<div class="container my-5">
    <h2 class="text-center mb-4">Featured Products</h2>

    <div class="row">

        
        <div class="col-6 col-md-3 mb-4">
            <div class="card">
                <img src="https://rukminim2.flixcart.com/image/1536/1536/xif0q/computer/m/9/q/255r-g10-thin-and-light-laptop-hp-original-imahktbzygaam644.jpeg?q=90" class="card-img-top" alt="Laptop">
                <div class="card-body text-center">
                    <h5 class="card-title">Laptop</h5>
                    <p class="card-text">₹59,000</p>
                    <a href="#" class="btn btn-primary">Buy Now</a>
                </div>
            </div>
        </div>

      
        <div class="col-6 col-md-3 mb-4">
            <div class="card">
                <img src="https://rukminim2.flixcart.com/image/1536/1536/xif0q/mobile/s/u/c/-enriched-transparent-original-imahkq28bun35ztx.png?q=90" class="card-img-top" alt="Mobile">
                <div class="card-body text-center">
                    <h5 class="card-title">Smartphone</h5>
                    <p class="card-text">₹42,999</p>
                    <a href="#" class="btn btn-primary">Buy Now</a>
                </div>
            </div>
        </div>

        
        <div class="col-6 col-md-3 mb-4">
            <div class="card">
                <img src="https://rukminim2.flixcart.com/image/1536/1536/xif0q/headphone/t/x/i/-original-imahg5yzrgny2zv5.jpeg?q=90" class="card-img-top" alt="Headphones">
                <div class="card-body text-center">
                    <h5 class="card-title">Headphones</h5>
                    <p class="card-text">₹2,500</p>
                    <a href="#" class="btn btn-primary">Buy Now</a>
                </div>
            </div>
        </div>

        
        <div class="col-6 col-md-3 mb-4">
            <div class="card">
                <img src="https://rukminim2.flixcart.com/image/1536/1536/xif0q/smartwatch/n/o/z/-enriched-transparent-original-imah76jstup5zdww.png?q=90" class="card-img-top" alt="Smart Watch">
                <div class="card-body text-center">
                    <h5 class="card-title">Smart Watch</h5>
                    <p class="card-text">₹1,890</p>
                    <a href="#" class="btn btn-primary">Buy Now</a>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
