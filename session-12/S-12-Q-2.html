<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Featured Playlists</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color:#f8f9fa;
        }
        .card img{
            height:220px;
            object-fit:cover;
        }
    </style>
</head>
<body>

<div class="container my-5">
    <h2 class="text-center mb-4">Featured Playlists</h2>

    <div class="row">

        <div class="col-md-4 mb-4">
            <div class="card">
                <img src="./top hits.jpg" class="card-img-top" alt="Playlist 1">
                <div class="card-body text-center">
                    <h5 class="card-title">Top Hits</h5>
                    <a href="#" class="btn btn-success">Listen Now</a>
                </div>
            </div>
        </div>

      
        <div class="col-md-4 mb-4">
            <div class="card">
                <img src="./chill.jpg" class="card-img-top" alt="Playlist 2">
                <div class="card-body text-center">
                    <h5 class="card-title">Chill Vibes</h5>
                    <a href="#" class="btn btn-success">Listen Now</a>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-4">
            <div class="card">
                <img src="./nature.jpg" class="card-img-top" alt="Playlist 3">
                <div class="card-body text-center">
                    <h5 class="card-title">Relaxing Tunes</h5>
                    <a href="#" class="btn btn-success">Listen Now</a>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
