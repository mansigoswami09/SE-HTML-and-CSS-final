<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Icons Flexbox</title>

<style>
    .container {
        display: flex;
        justify-content: space-evenly;
        align-items: center;
        margin-top: 50px;
    
    }

    .container img {
        width: 100px;
        height: 100px;
        object-fit: contain;
        border-radius: 20px;
    }
</style>
</head>
<body>

<div class="container">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSmLMeCMRrwdD3io9ne_xIIyQ0qwVfyv3NrD8pMhnlamg&s" alt="Instagram">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQoDaPctfHlcUaZPxrAWRq_4r5HQwWKiV7cK12RBLe5Gw&s=10" alt="WhatsApp">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS6-p9PJw1r8CqY5LyCWVYzyqkPwoRoZiS0PpSs86IvAw&s=10" alt="Zomato">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRrK119yU9UpNb57y6LozJOAkNsZi4UM1a6uDvTD1EMOQ&s=10" alt="Spotify">
</div>

</body>
</html>
