<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three breakpoints</title>
    <style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f1f3f6;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    width:350px;
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
    text-align:center;
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card h3{
    font-size:24px;
    margin:15px 0;
}

.price{
    font-size:22px;
    color:green;
    font-weight:bold;
}

.offer{
    font-size:18px;
    color:#388e3c;
}

button{
    margin-top:15px;
    padding:10px;
    width:100%;
    background:#2874f0;
    color:white;
    border:none;
    border-radius:5px;
}


@media only screen and (max-width:1200px){
    .card{
        padding:25px;
    }

    .card h3{
        font-size:22px;
    }
}


@media only screen and (max-width:900px){
    .card{
        padding:20px;
    }

    .card h3{
        font-size:20px;
    }

    .price{
        font-size:20px;
    }
}


@media only screen and (max-width:600px){
    .card{
        width:90%;
        padding:15px;
    }

    .card h3{
        font-size:18px;
    }

    .price{
        font-size:18px;
    }

    .offer{
        font-size:14px;
    }

    button{
        font-size:14px;
    }
}
</style>
</head>
<body>
     <div class="card">
        <img src="https://encrypted-tbn3.gstatic.com/shopping?q=tbn:ANd9GcT39vBIgw4le9PKrogqsFHW78LwH6as58iCwHeT8pj4dq8pUtU1dGR5ux61AhfX0mHYz6Qm4I1M70rw8D-slWWn-Nh7vdiSkI4yV82C-S8" alt="headphones">
    <div class="details">
        <h3>Wireless headphones</h3>
        <div class="price">₹1,399</div>
        <div class="offer">53 % Off</div>
        <button>Add to Cart</button>
    </div>
    </div>
</body>
</html>
