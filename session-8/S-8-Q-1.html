<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Product Card</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing: border-box;
            font-family:Arial, Helvetica, sans-serif;
        }
        body{
            background:#f1f3f6;
            display:flex;
            justify-content: center;
            align-items:center;
            min-height:100vh;
        }
        .card{
            width:280px;
            background:#fff;
            border-radius:10px;
            box-shadow:0 2px 8px rgba(0,0,0,0.2);
            overflow:hidden;
            transition:0.3s;
        }
        .card:hover{
            transform:scale(1.03);
        }
        .card img{
            width:100%;
            height:220px;
            object-fit: cover;
        }
        .details{
            padding:15px;
        }
        .details h3{
            font-size:20px;
            margin-bottom:10px;
        }
        .price{
            color:green;
            font-size:22px;
            font-weight:bold;
            margin-bottom:8px;
        }
        .offer{
            color:#388e3c;
            font-size:15px;
            margin-bottom:10px;
        }
        button{
            width:100%;
            padding:10px;
            background:#2874f0;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }
        button:hover{
            background: #0b5ed7;
        }
        @media(max-width:600px){
            body{
                padding:20px;
            }
            .card{
                width:100%;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://encrypted-tbn3.gstatic.com/shopping?q=tbn:ANd9GcT39vBIgw4le9PKrogqsFHW78LwH6as58iCwHeT8pj4dq8pUtU1dGR5ux61AhfX0mHYz6Qm4I1M70rw8D-slWWn-Nh7vdiSkI4yV82C-S8" alt="headphones">
    <div class="details">
        <h3>Wireless headphones</h3>
        <div class="price">₹1,399</div>
        <div class="offer">53 % Off</div>
        <button>Add to Cart</button>
    </div>
    </div>
</body>
</html>
