<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Spacing Utilities</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">Flipkart Product Cards</h2>

    <div class="row">

       
        <div class="col-md-4">
            <div class="card m-1 p-1">
                <img src="https://rukminim2.flixcart.com/image/1536/1536/xif0q/headphone/t/x/i/-original-imahg5yzrgny2zv5.jpeg?q=90"
                     class="card-img-top" alt="Headphones">
                <div class="card-body">
                    <h5 class="card-title">Wireless Headphones</h5>
                </div>
            </div>
        </div>

      
        <div class="col-md-4">
            <div class="card m-3 p-3">
                <img src="https://rukminim2.flixcart.com/image/1536/1536/xif0q/mobile/s/u/c/-enriched-transparent-original-imahkq28bun35ztx.png?q=90"
                     class="card-img-top" alt="Smartphone">
                <div class="card-body">
                    <h5 class="card-title">Smartphone</h5>
                </div>
            </div>
        </div>

        
        <div class="col-md-4">
            <div class="card m-5 p-5">
                <img src="https://rukminim2.flixcart.com/image/1536/1536/xif0q/computer/m/9/q/255r-g10-thin-and-light-laptop-hp-original-imahktbzygaam644.jpeg?q=90"
                     class="card-img-top" alt="Laptop">
                <div class="card-body">
                    <h5 class="card-title">Laptop</h5>
                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
