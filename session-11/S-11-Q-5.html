<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Switcher</title>

   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div id="mainContainer" class="container mt-5 p-5 bg-light text-dark rounded">

    <h2 class="text-center">Theme Switcher</h2>

    <p class="text-center">
        Click the button below to switch between Light and Dark themes.
    </p>

    <div class="text-center">
        <button class="btn btn-primary" onclick="changeTheme()">
            Change Theme
        </button>
    </div>

</div>

<script>
function changeTheme() {

    let container = document.getElementById("mainContainer");

    container.classList.toggle("bg-light");
    container.classList.toggle("bg-dark");

    container.classList.toggle("text-dark");
    container.classList.toggle("text-light");
}
</script>



</body>
</html>
