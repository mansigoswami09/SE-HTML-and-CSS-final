<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Ticket Button</title>

   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .btn-primary{
            background-color: #ff4d6d;
            border-color: #ff4d6d;
            color: white;
        }

        .btn-primary:hover{
            background-color: #f2254e;
            border-color: #e6395c;
        }
    </style>

</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">

        <div class="col-md-4">

            <div class="card shadow">
                <img src="https://assets-in.bmscdn.com/iedb/movies/images/mobile/thumbnail/xlarge/jindagi-once-more-et00501011-1780035511.jpg"
                     class="card-img-top"
                     alt="Movie Poster">

                <div class="card-body text-center">

                    <h3>Zindagi Once More</h3>

                    <p class="text-muted">
                        A heartwarming family drama with emotional moments and a meaningful story.
                    </p>

                    <button class="btn btn-primary">
                        Book Ticket
                    </button>

                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
