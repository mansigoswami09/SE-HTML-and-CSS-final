<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomato Restaurant List</title>

   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">Zomato Restaurant List</h2>

    <div class="row">

        
        <div class="col-md-6 mb-4">
            <div class="card shadow">
                <div class="card-body">

                    <h4 class="card-title">Pepito Restaurant</h4>

                    <p class="text-success fw-bold">
                        ⭐ Rating: 4.5/5
                    </p>

                    <span class="badge bg-warning text-dark">
                        20% OFF
                    </span>

                    <p class="mt-3 text-success fw-semibold">
                        Open Now
                    </p>

                </div>
            </div>
        </div>

       
        <div class="col-md-6 mb-4">
            <div class="card shadow">
                <div class="card-body">

                    <h4 class="card-title">Spice Garden</h4>

                    <p class="text-success fw-bold">
                        ⭐ Rating: 4.2/5
                    </p>

                    <span class="badge bg-info">
                        Free Delivery
                    </span>

                    <p class="mt-3 text-danger fw-semibold">
                        Closed
                    </p>

                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
