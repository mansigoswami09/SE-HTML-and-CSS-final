<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookMyShow Movie Review Card</title>

   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow">
                <img src="https://assets-in.bmscdn.com/iedb/movies/images/mobile/thumbnail/xlarge/jindagi-once-more-et00501011-1780035511.jpg"
                     class="card-img-top"
                     alt="Movie Poster">

                <div class="card-body">
                   
                    <h2 class="fw-bold fs-2">
                        Zindagi Once More
                    </h2>

                    <p class="text-warning fw-semibold fs-5">
                        ⭐ 9.5/10
                    </p>

                    <p class="text-muted fw-normal fs-6">
                        A heartwarming family drama with emotional moments and a 
                        meaningful story. A perfect movie to watch with your loved ones.
                    </p>

                    <button class="btn btn-danger">
                        Book Tickets
                    </button>

                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
