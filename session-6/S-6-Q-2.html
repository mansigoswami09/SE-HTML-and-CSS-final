<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart-style Product</title>
    <style>
        .product-card{
            Width: 220px;
            border: 1px solid #ccc;
            padding:10px;
            text-align:center;
        }
        .product-card img{
            width:100%;
            display:block;
        }
        .product-name{
            display:block;
            font-size: 18px;
            margin-top:10px;
        }
        .price{
            display: inline-block;
            color: green;
            font-weight: bold;
            margin-top: 5px;
        }

        .hide-price .price{
            display:none;
        }
    </style>
</head>
<body>
    <div class="product-card hide-price">
        <img src="https://rukminim2.flixcart.com/image/767/767/xif0q/television/m/b/q/-original-imahz2f8ndhsb9r4.jpeg?q=90" alt="product">
        <span class="product-name">LED Smart Tizen TV</span>
        <span class="price">₹44,990</span>
    </div>
</body>
</html>
