<!DOCTYPE html>
<html>
<head>
    <title>WhatsApp Badge</title>
    
    <style>
        .content{
            height: 2000px;

        }
        .whatsapp-box{
            position: fixed;
            bottom: 20px;
            right: 20px;
        }

        .whatsapp-icon{
            width: 60px;
            height: 60px;
            background: #25D366;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 35px;
            color: white;
            position: relative;
        }

        .badge{
            position: absolute;
            top: -8px;
            right: -8px;
            background: #1DA1F2;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            text-align: center;
            line-height: 28px;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="content">
    <h1>Scroll Down:</h1>
</div>
<div class="whatsapp-box">
    <div class="whatsapp-icon">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQoDaPctfHlcUaZPxrAWRq_4r5HQwWKiV7cK12RBLe5Gw&s=10" alt="WhatsApp" height="50" width="50">
        <span class="badge">5</span>
    </div>
</div>

</body>
</html>
