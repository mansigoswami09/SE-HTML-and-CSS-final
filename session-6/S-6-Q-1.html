<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomato Restaurant card</title>
    <style>
        .card{
            width:300px;
            border: 2px solid black;
            margin:20px;
            padding:15px;
        }

        .section{
            border: 2px solid gray;
            margin:10px ;
            padding:10px;
        }

        .rating{
            border:2px solid #ddd;
            background-color: green;
            color:white;
            width:80px;
          
           
        }

    </style>
</head>
<body>
    <div class="card">
        <div class="section">
            <h2>Rajwadi Thali</h2>
        </div>

        <div class="section">
        <p>Cuisine: Gujarati </p>
        </div>

        <div class="section rating">
            Rating: 4.7
        </div>
    </div>
</body>
</html>
