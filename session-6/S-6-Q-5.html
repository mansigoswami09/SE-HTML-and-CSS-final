<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomato Restaurant card</title>
    <style>
         /* Reusable spacing class reduces code duplication.
       If spacing needs to change later, it can be updated
       in one place, improving maintainability. */
    .spacing{
        margin:10px;
        padding:10px;
    }

        .card{
            width:300px;
            border: 2px solid black;
            
        }

        .section{
            border: 2px solid gray;
            
        }

        .rating{
            border:2px solid #ddd;
            background-color: green;
            color:white;
            width:80px;
          
           
        }

    </style>
</head>
<body>
    <div class="card spacing">
        <div class="section spacing">
            <h2>Rajwadi Thali</h2>
        </div>

        <div class="section spacing">
        <p>Cuisine: Gujarati </p>
        </div>

        <div class="section rating spacing">
            Rating: 4.7
        </div>
    </div>
</body>
</html>
