<!DOCTYPE html>
<html>
<head>
    <title>Forms Assignment</title>
</head>
<body>

    <h1>Flipkart Product Review Form</h1>

    <!-- Question 1, 2 & 3 -->

    <form action="#" method="POST">

        <label for="username">Username:</label><br>
        <input type="text" id="username" name="username" required>
        <br><br>

        <label for="rating">Rating:</label><br>
        <select id="rating" name="rating" required>
            <option value="" selected disabled>Select Rating</option>
            <option value="1">1 Star</option>
            <option value="2">2 Stars</option>
            <option value="3">3 Stars</option>
            <option value="4">4 Stars</option>
            <option value="5">5 Stars</option>
        </select>
        <br><br>

        <label for="review">Review Message:</label><br>
        <textarea name="review" id="review"   rows="5" cols="30" minlength="20" required></textarea>
        <br><br>

        <input type="submit" value="Submit Review">

    </form>

    <hr>

    <h1>Zomato Food Order Form</h1>

    <!-- Question 4 & 5 -->

    <form>

        <!-- Disabled because users should not change system-generated order IDs -->
        <label for="orderid">Order ID:</label><br>
        <input type="text" id="orderid" value="ORD12345" disabled>
        <br><br>

        <label for="name">Customer Name:</label><br>
        <input type="text" id="name" name="name" required>
        <br><br>

        <label for="food">Food Item:</label><br>
        <select id="food" name="food" required>
            <option value="">Select Food Item</option>
            <option value="Pizza">Pizza</option>
            <option value="Burger">Burger</option>
            <option value="Pasta">Pasta</option>
        </select>
        <br><br>

        <label for="quantity">Quantity:</label><br>
        <input type="number" id="quantity" name="quantity"
               min="1" required>
        <br><br>

        <label for="instructions">Delivery Instructions:</label><br>
        <textarea name="instruction" id="instructions"  required></textarea>
        <br><br>

        <input type="submit" value="Place Order">

    </form>

</body>
</html>
